server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy API calls to the backend service on the Docker
  # network. The frontend container calls /api on its own origin so
  # CORS is not required and the same image works on localhost and
  # on the Poridhi Lab VM without rebuilding.
  #
  # `${BACKEND_HOST}` and `${BACKEND_PORT}` are NOT nginx variables —
  # they are shell placeholders. docker-entrypoint.sh runs `envsubst`
  # to replace them with the real values from the environment before
  # nginx starts, so nginx sees a literal upstream address and does
  # NOT need a `resolver` directive.
  location /api/ {
    proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT}/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Health passthrough (so /api/health works the same as /health)
  location = /api/health {
    proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT}/health;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
